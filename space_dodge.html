<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太空梭躲避隕石</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #ui {
    display: flex;
    gap: 40px;
    margin-bottom: 10px;
    color: #0ff;
    font-size: 16px;
    text-shadow: 0 0 8px #0ff;
  }
  #canvas {
    border: 1px solid #0ff;
    box-shadow: 0 0 20px #0ff4, 0 0 60px #0004;
    display: block;
  }
  #hint {
    margin-top: 10px;
    color: #555;
    font-size: 13px;
  }
  #ai-panel {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    background: rgba(0,0,10,0.92);
    border: 1px solid #0ff;
    box-shadow: 0 0 30px #0ff6, 0 0 60px #0ff2;
    padding: 24px 32px;
    min-width: 320px;
    font-family: 'Courier New', monospace;
    color: #0ff;
    flex-direction: column;
  }
  #ai-panel h2 {
    text-align: center;
    font-size: 18px;
    margin-bottom: 18px;
    text-shadow: 0 0 10px #0ff;
  }
  .param-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
  }
  .param-label { width: 72px; font-size: 13px; color: #aef; }
  .param-row input[type=range] { flex: 1; accent-color: #0ff; cursor: pointer; }
  .param-val { width: 56px; text-align: right; font-size: 13px; color: #fff; }
  #ai-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 18px;
    gap: 12px;
  }
  #ai-buttons button {
    flex: 1;
    padding: 8px 0;
    background: transparent;
    border: 1px solid #0ff;
    color: #0ff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    transition: box-shadow 0.2s, background 0.2s;
  }
  #ai-buttons button:hover {
    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 12px #0ff;
  }
  #benchmark-panel {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 101;
    background: rgba(0,0,10,0.95);
    border: 1px solid #0ff;
    box-shadow: 0 0 30px #0ff6, 0 0 60px #0ff2;
    padding: 20px 24px;
    width: 760px;
    font-family: 'Courier New', monospace;
    color: #0ff;
    flex-direction: column;
  }
  #benchmark-panel h2 {
    text-align: center;
    font-size: 16px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px #0ff;
  }
  #bm-summary {
    display: flex;
    gap: 24px;
    margin-bottom: 10px;
    font-size: 13px;
    color: #aef;
  }
  #bm-table-wrap {
    max-height: 280px;
    overflow-y: auto;
    margin-bottom: 12px;
  }
  #bm-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    color: #cef;
  }
  #bm-table th {
    color: #0ff;
    border-bottom: 1px solid #0ff4;
    padding: 4px 6px;
    text-align: center;
    white-space: nowrap;
  }
  #bm-table td {
    padding: 3px 6px;
    text-align: center;
    border-bottom: 1px solid #0ff2;
  }
  #bm-table tbody tr:first-child td { color: #ff8; }
  #bm-buttons {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  #bm-buttons button {
    flex: 1;
    padding: 7px 0;
    background: transparent;
    border: 1px solid #0ff;
    color: #0ff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: box-shadow 0.2s, background 0.2s;
  }
  #bm-buttons button:hover {
    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 12px #0ff;
  }
  .strat-btn, .epoch-btn {
    flex: 1;
    padding: 5px 0;
    background: transparent;
    border: 1px solid #0ff4;
    color: #0ff8;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .strat-btn.active, .epoch-btn.active {
    background: rgba(0,255,255,0.18);
    border-color: #0ff;
    color: #fff;
  }
  .strat-btn:hover, .epoch-btn:hover {
    background: rgba(0,255,255,0.1);
  }
  #epoch-summary-table {
    width: 100%;
    font-size: 11px;
    color: #aef;
    border-collapse: collapse;
    margin-bottom: 8px;
  }
  #epoch-summary-table th {
    color: #ff8;
    border-bottom: 1px solid #ff84;
    padding: 3px 6px;
    text-align: center;
  }
  #epoch-summary-table td {
    padding: 2px 6px;
    text-align: center;
    border-bottom: 1px solid #ff82;
  }
</style>
</head>
<body>

<div id="ui">
  <span>分數：<span id="score">0</span></span>
  <span>生命：<span id="lives">❤️❤️❤️</span></span>
  <span>等級：<span id="level">1</span></span>
  <span id="epoch-hud" style="display:none;">Epoch <span id="epoch-cur">0</span>/<span id="epoch-total">1</span></span>
</div>
<canvas id="canvas" width="480" height="640"></canvas>
<div id="ai-panel">
  <h2>AI 參數設定</h2>
  <div class="param-row">
    <span class="param-label">反應延遲</span>
    <input type="range" id="p-reaction" min="0" max="500" step="50" value="250">
    <span class="param-val" id="v-reaction">250 ms</span>
  </div>
  <div class="param-row">
    <span class="param-label">安全距離</span>
    <input type="range" id="p-safety" min="40" max="150" step="10" value="80">
    <span class="param-val" id="v-safety">80 px</span>
  </div>
  <div class="param-row">
    <span class="param-label">瞄準容差</span>
    <input type="range" id="p-aim" min="0" max="80" step="10" value="40">
    <span class="param-val" id="v-aim">40 px</span>
  </div>
  <div class="param-row">
    <span class="param-label">攻擊性</span>
    <input type="range" id="p-aggr" min="1" max="10" step="1" value="7">
    <span class="param-val" id="v-aggr">7</span>
  </div>
  <div class="param-row">
    <span class="param-label">預測幀數</span>
    <input type="range" id="p-look" min="10" max="60" step="5" value="20">
    <span class="param-val" id="v-look">20 fr</span>
  </div>
  <div class="param-row" style="margin-top:10px;">
    <span class="param-label">AI 策略</span>
    <div id="strategy-btns" style="display:flex;gap:6px;flex:1;">
      <button class="strat-btn active" data-strat="threat">威脅迴避</button>
      <button class="strat-btn" data-strat="aggressive">強攻型</button>
      <button class="strat-btn" data-strat="defensive">防守型</button>
    </div>
  </div>
  <div class="param-row">
    <span class="param-label">Epoch</span>
    <div id="epoch-btns" style="display:flex;gap:6px;flex:1;">
      <button class="epoch-btn active" data-epoch="1">×1</button>
      <button class="epoch-btn" data-epoch="10">×10</button>
      <button class="epoch-btn" data-epoch="20">×20</button>
      <button class="epoch-btn" data-epoch="30">×30</button>
    </div>
  </div>
  <div id="ai-buttons">
    <button id="btn-back">◄ 返回</button>
    <button id="btn-start">開始 AI ►</button>
  </div>
</div>
<div id="benchmark-panel">
  <h2>Benchmark 歷史紀錄</h2>
  <div id="bm-summary">
    <span>共 <span id="bm-count">0</span> 場</span>
    <span>均分：<span id="bm-avg">—</span></span>
    <span>最高：<span id="bm-best">—</span></span>
    <span>標準差：<span id="bm-std">—</span></span>
    <span>均存活：<span id="bm-avgtime">—</span>s</span>
  </div>
  <div id="epoch-summary-wrap" style="max-height:80px;overflow-y:auto;margin-bottom:6px;">
    <table id="epoch-summary-table">
      <thead>
        <tr>
          <th>EpochID</th><th>策略</th><th>局數</th>
          <th>均分</th><th>最高</th><th>標準差</th><th>均時長</th>
        </tr>
      </thead>
      <tbody id="epoch-summary-tbody"></tbody>
    </table>
  </div>
  <div id="bm-table-wrap">
    <table id="bm-table">
      <thead>
        <tr>
          <th>#</th><th>Epoch</th><th>策略</th><th>分數</th><th>等級</th><th>命中率</th>
          <th>時長</th><th>Idle</th><th>Track</th><th>Fire</th>
          <th>Evade</th><th>Dodge</th>
        </tr>
      </thead>
      <tbody id="bm-tbody"></tbody>
    </table>
  </div>
  <div id="bm-buttons">
    <button id="btn-bm-close">✕ 關閉 (B)</button>
    <button id="btn-bm-export">↓ 匯出 CSV (E)</button>
  </div>
</div>
<div id="hint">方向鍵 / WASD 移動　　Space 發射雷射　　H：HUD　B：Benchmark　E：匯出 CSV　R：安全距離</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// --- 狀態 ---
let state = 'start'; // start | menu | ai_params | playing | dead | gameover
let score = 0, lives = 3, level = 1;
let gameMode  = 'player';   // 'player' | 'ai'
let menuIndex = 0;          // 0=玩家模式, 1=AI模式
let aiParams = {
  reactionDelay:   250,
  safetyRadius:     80,
  aimTolerance:     40,
  aggressionLevel:   7,
  lookaheadFrames:  20,
};

// --- AI 策略 ---
let currentStrategy = 'threat'; // 'threat' | 'aggressive' | 'defensive'

function _threatDecide(gs, p) {
  const px = gs.player.x, py = gs.player.y;
  let left = false, right = false, up = false, down = false, shoot = false;
  let threat = null, maxThreat = 0;
  gs.asteroids.forEach(a => {
    const dist = Math.hypot(px - a.x, py - a.y);
    const danger = a.vy / Math.max(dist, 1);
    if (dist < p.safetyRadius * 2 && danger > maxThreat) { maxThreat = danger; threat = a; }
  });
  let evading = false;
  if (threat) {
    const fx = threat.x + threat.vx * p.lookaheadFrames;
    const fy = threat.y + threat.vy * p.lookaheadFrames;
    if (Math.hypot(px - fx, py - fy) < p.safetyRadius) {
      left  = px < fx;
      right = px > fx;
      if (py < fy) down = true;
      evading = true;
    }
  }
  gs.asteroids.forEach(a => {
    if (a.y < py && Math.abs(a.x - px) < p.aimTolerance && Math.random() < p.aggressionLevel / 10) shoot = true;
  });
  return { left, right, up, down, shoot, _threat: threat, _evading: evading };
}

function _threatState(gs, p) {
  const res = _threatDecide(gs, p);
  if (res._evading && res._threat) {
    return Math.hypot(gs.player.x - res._threat.x, gs.player.y - res._threat.y) < p.safetyRadius * 0.5 ? 'Dodging' : 'Evading';
  }
  if (res.shoot) return 'Firing';
  if (gs.asteroids.some(a => a.y < gs.player.y)) return 'Tracking';
  return 'Idle';
}

const AI_STRATEGIES = {
  threat: {
    name: '威脅迴避',
    decide(gs, p) {
      const r = _threatDecide(gs, p);
      return { left: r.left, right: r.right, up: r.up, down: r.down, shoot: r.shoot };
    },
    getDecisionState: _threatState,
  },

  aggressive: {
    name: '強攻型',
    decide(gs, p) {
      const px = gs.player.x, py = gs.player.y;
      let left = false, right = false, up = false, down = false, shoot = false;
      const safeR = p.safetyRadius * 0.6;
      const aimTol = p.aimTolerance * 1.5;
      // 只在非常近時才迴避
      let threat = null, maxThreat = 0;
      gs.asteroids.forEach(a => {
        const dist = Math.hypot(px - a.x, py - a.y);
        const danger = a.vy / Math.max(dist, 1);
        if (dist < safeR * 2 && danger > maxThreat) { maxThreat = danger; threat = a; }
      });
      let evading = false;
      if (threat) {
        const fx = threat.x + threat.vx * p.lookaheadFrames;
        const fy = threat.y + threat.vy * p.lookaheadFrames;
        if (Math.hypot(px - fx, py - fy) < safeR) {
          left = px < fx; right = px > fx;
          if (py < fy) down = true;
          evading = true;
        }
      }
      // 主動對齊最近可攻擊目標
      if (!evading) {
        let target = null, minDist = Infinity;
        gs.asteroids.forEach(a => {
          if (a.y < py) { const d = Math.abs(a.x - px); if (d < minDist) { minDist = d; target = a; } }
        });
        if (target) {
          if (target.x < px - 4) left = true;
          else if (target.x > px + 4) right = true;
        }
      }
      // 積極射擊
      gs.asteroids.forEach(a => {
        if (a.y < py && Math.abs(a.x - px) < aimTol && Math.random() < 0.9) shoot = true;
      });
      return { left, right, up, down, shoot, _threat: threat, _evading: evading };
    },
    getDecisionState(gs, p) {
      const res = this.decide(gs, p);
      if (res._evading && res._threat) {
        return Math.hypot(gs.player.x - res._threat.x, gs.player.y - res._threat.y) < p.safetyRadius * 0.3 ? 'Dodging' : 'Evading';
      }
      if (res.shoot) return 'Firing';
      if (gs.asteroids.some(a => a.y < gs.player.y)) return 'Tracking';
      return 'Idle';
    },
  },

  defensive: {
    name: '防守型',
    decide(gs, p) {
      const px = gs.player.x, py = gs.player.y;
      let left = false, right = false, up = false, down = false, shoot = false;
      const safeR = p.safetyRadius * 1.5;
      const look  = p.lookaheadFrames * 1.8;
      // 更早開始逃跑
      let threat = null, maxThreat = 0;
      gs.asteroids.forEach(a => {
        const dist = Math.hypot(px - a.x, py - a.y);
        const danger = a.vy / Math.max(dist, 1);
        if (dist < safeR * 2 && danger > maxThreat) { maxThreat = danger; threat = a; }
      });
      let evading = false;
      if (threat) {
        const fx = threat.x + threat.vx * look;
        const fy = threat.y + threat.vy * look;
        if (Math.hypot(px - fx, py - fy) < safeR) {
          left = px < fx; right = px > fx;
          if (py < fy) down = true;
          evading = true;
        }
      }
      // 往畫面下半部中央靠攏（無威脅時）
      if (!evading) {
        const targetX = W / 2, targetY = H * 0.78;
        if (px < targetX - 10) right = true;
        else if (px > targetX + 10) left = true;
        if (py < targetY - 10) down = true;
        else if (py > targetY + 10) up = true;
      }
      // 邊界排斥
      if (px < W * 0.15) right = true;
      if (px > W * 0.85) left = true;
      // 保守射擊
      gs.asteroids.forEach(a => {
        if (a.y < py && Math.abs(a.x - px) < p.aimTolerance * 0.6 && Math.random() < 0.3) shoot = true;
      });
      return { left, right, up, down, shoot, _threat: threat, _evading: evading };
    },
    getDecisionState(gs, p) {
      const res = this.decide(gs, p);
      if (res._evading && res._threat) {
        return Math.hypot(gs.player.x - res._threat.x, gs.player.y - res._threat.y) < p.safetyRadius * 0.75 ? 'Dodging' : 'Evading';
      }
      if (res.shoot) return 'Firing';
      if (gs.asteroids.some(a => a.y < gs.player.y)) return 'Tracking';
      return 'Idle';
    },
  },
};

// --- Epoch 系統 ---
let epochSize       = 1;
let epochCurrent    = 0;
let epochIdCounter  = 0;
let currentEpochId  = null;
let epochRunsBuffer = [];
let epochHistory    = [];
let frameCount = 0;
let invincible = 0;      // 無敵幀數
let shake = 0;           // 震動幀數

// --- AI 研究追蹤 ---
let hudVisible           = false;
let safetyRadiusVisible  = false;
let aiDecisionState = 'Idle';  // 'Idle' | 'Tracking' | 'Firing' | 'Evading' | 'Dodging'
let shotsFired      = 0;
let shotsHit        = 0;

// --- Benchmark 資料 ---
let runHistory       = [];
let stateFrameCounts = { Idle:0, Tracking:0, Firing:0, Evading:0, Dodging:0 };
let benchmarkVisible = false;

// --- 星空背景 ---
const stars = Array.from({length: 120}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.5 + 0.3,
  speed: Math.random() * 0.6 + 0.2,
  bright: Math.random()
}));

// --- 玩家 ---
const player = {
  x: W / 2, y: H - 90,
  w: 36, h: 56,
  vx: 0, vy: 0,
  speed: 5,
  trail: []
};

// --- 集合 ---
let asteroids = [];
let lasers = [];
let explosions = [];
let particles = [];

// --- 鍵盤 ---
const keys = {};
function showAiPanel()  { document.getElementById('ai-panel').style.display = 'flex'; state = 'ai_params'; }
function hideAiPanel()  { document.getElementById('ai-panel').style.display = 'none'; }
function confirmMenu()  { if (menuIndex === 0) startGame('player'); else showAiPanel(); }
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'playing')                      fireLaser();
    else if (state === 'start' || state === 'gameover') { currentEpochId = null; epochCurrent = 0; document.getElementById('epoch-hud').style.display = 'none'; state = 'menu'; shake = 0; }
    else if (state === 'menu')                    confirmMenu();
  }
  if (e.code === 'Enter') {
    if      (state === 'start' || state === 'gameover') { currentEpochId = null; epochCurrent = 0; document.getElementById('epoch-hud').style.display = 'none'; state = 'menu'; shake = 0; }
    else if (state === 'menu')                          confirmMenu();
  }
  if ((e.code === 'ArrowUp' || e.code === 'ArrowDown') && state === 'menu') {
    menuIndex = menuIndex === 0 ? 1 : 0;
    e.preventDefault();
  }
  if (e.code === 'Escape' && state === 'ai_params') {
    hideAiPanel(); state = 'menu'; shake = 0;
  }
  if (e.code === 'Escape' && (state === 'playing' || state === 'gameover')) {
    currentEpochId = null; epochCurrent = 0;
    document.getElementById('epoch-hud').style.display = 'none';
  }
  if (e.code === 'KeyH') hudVisible = !hudVisible;
  if (e.code === 'KeyR') safetyRadiusVisible = !safetyRadiusVisible;
  if (e.code === 'KeyB') {
    benchmarkVisible = !benchmarkVisible;
    document.getElementById('benchmark-panel').style.display = benchmarkVisible ? 'flex' : 'none';
  }
  if (e.code === 'KeyE' && runHistory.length > 0) exportCSV();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// --- 初始化 ---
function startGame(mode = 'player') {
  gameMode = mode;
  state = 'playing';
  score = 0; lives = 3; level = 1; frameCount = 0;
  invincible = 0; shake = 0; laserCooldown = 0;
  shotsFired = 0; shotsHit = 0; aiDecisionState = 'Idle';
  stateFrameCounts = { Idle:0, Tracking:0, Firing:0, Evading:0, Dodging:0 };
  asteroids = []; lasers = []; explosions = []; particles = [];
  player.x = W / 2; player.y = H - 90;
  player.vx = 0; player.vy = 0;
  player.trail = [];
  // epoch HUD
  if (mode === 'ai' && epochSize > 1) {
    document.getElementById('epoch-hud').style.display = '';
    document.getElementById('epoch-cur').textContent   = epochCurrent + 1;
    document.getElementById('epoch-total').textContent = epochSize;
  } else {
    document.getElementById('epoch-hud').style.display = 'none';
  }
}

// --- 產生隕石 ---
function spawnAsteroid() {
  const size = 18 + Math.random() * 24 + Math.min(level * 2, 20);
  asteroids.push({
    x: size + Math.random() * (W - size * 2),
    y: -size,
    r: size,
    vx: (Math.random() - 0.5) * (1.5 + level * 0.3),
    vy: 1.5 + Math.random() * 1.5 + level * 0.25,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.05,
    hp: size > 32 ? 2 : 1,
    color: `hsl(${20 + Math.random()*30},60%,${35 + Math.random()*20}%)`
  });
}

// --- 發射雷射 ---
let laserCooldown = 0;
function fireLaser() {
  if (laserCooldown > 0) return;
  lasers.push({ x: player.x, y: player.y - player.h / 2, vy: -14, w: 3, h: 18 });
  laserCooldown = 12;
  shotsFired++;
}

// --- 爆炸 ---
function explode(x, y, big) {
  const count = big ? 28 : 14;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * (big ? 5 : 3) + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.025 + Math.random() * 0.02,
      r: Math.random() * (big ? 4 : 2.5) + 1,
      color: `hsl(${20 + Math.random()*40},100%,${55+Math.random()*20}%)`
    });
  }
  explosions.push({ x, y, r: big ? 40 : 22, life: 1, decay: 0.06 });
  if (big) shake = 14;
}

// --- 狀態輸出 API ---
function getGameState() {
  return {
    player: {
      x: player.x, y: player.y,
      vx: player.vx, vy: player.vy,
      invincible: invincible > 0,
      invincibleFrames: invincible,
    },
    laserCooldown,
    asteroids: asteroids.map(a => ({ x: a.x, y: a.y, r: a.r, vx: a.vx, vy: a.vy, hp: a.hp })),
    lasers:    lasers.map(l => ({ x: l.x, y: l.y, vy: l.vy })),
    score, lives, level, frameCount, state, gameMode, shake,
  };
}

// --- 指令控制 API ---
function executeCommand(cmd = {}) {
  keys['ArrowLeft']  = !!cmd.left;
  keys['ArrowRight'] = !!cmd.right;
  keys['ArrowUp']    = !!cmd.up;
  keys['ArrowDown']  = !!cmd.down;
  if (cmd.shoot) fireLaser();
}

// --- AI 控制 ---
function aiUpdate() {
  const gs    = getGameState();
  const strat = AI_STRATEGIES[currentStrategy];
  const cmd   = strat.decide(gs, aiParams);
  aiDecisionState = strat.getDecisionState(gs, aiParams);
  stateFrameCounts[aiDecisionState]++;
  executeCommand(cmd);
}

// --- 更新 ---
function update() {
  frameCount++;
  if (laserCooldown > 0) laserCooldown--;
  if (invincible > 0) invincible--;
  if (shake > 0) shake--;

  // 升級
  level = 1 + Math.floor(score / 300);

  // 星空
  stars.forEach(s => { s.y += s.speed; if (s.y > H) s.y = 0; });

  // AI 操控（取代鍵盤輸入）
  if (gameMode === 'ai') aiUpdate();

  // 玩家移動
  const sp = player.speed;
  if (keys['ArrowLeft']  || keys['KeyA']) player.vx -= 0.8;
  if (keys['ArrowRight'] || keys['KeyD']) player.vx += 0.8;
  if (keys['ArrowUp']    || keys['KeyW']) player.vy -= 0.8;
  if (keys['ArrowDown']  || keys['KeyS']) player.vy += 0.8;
  player.vx *= 0.82; player.vy *= 0.82;
  player.vx = Math.max(-sp, Math.min(sp, player.vx));
  player.vy = Math.max(-sp, Math.min(sp, player.vy));
  player.x += player.vx; player.y += player.vy;
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
  player.y = Math.max(player.h/2, Math.min(H - player.h/2, player.y));

  // 尾焰粒子
  player.trail.push({ x: player.x + (Math.random()-0.5)*8, y: player.y + player.h/2, life: 1, r: 5+Math.random()*4 });
  player.trail = player.trail.filter(t => { t.y += 2; t.life -= 0.08; t.r *= 0.93; return t.life > 0; });

  // 產生隕石
  const spawnRate = Math.max(28 - level * 3, 10);
  if (frameCount % spawnRate === 0) spawnAsteroid();

  // 雷射移動
  lasers = lasers.filter(l => { l.y += l.vy; return l.y > -l.h; });

  // 隕石移動 & 碰撞
  asteroids = asteroids.filter(a => {
    a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed;
    if (a.y > H + a.r * 2) return false;

    // 雷射打到隕石
    lasers = lasers.filter(l => {
      const dx = l.x - a.x, dy = (l.y + l.h/2) - a.y;
      if (Math.sqrt(dx*dx + dy*dy) < a.r + 4) {
        a.hp--;
        shotsHit++;
        if (a.hp <= 0) {
          explode(a.x, a.y, a.r > 28);
          score += a.r > 28 ? 30 : 15;
        } else {
          // 被打到但未摧毀
          particles.push({ x: a.x, y: a.y, vx:(Math.random()-0.5)*3, vy:-2, life:1, decay:0.08, r:3, color:'#fff' });
        }
        return false; // 雷射消失
      }
      return true;
    });
    if (a.hp <= 0) return false;

    // 碰到玩家
    if (invincible === 0 && state === 'playing') {
      const dx = player.x - a.x, dy = player.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < a.r + 16) {
        lives--;
        invincible = 120;
        shake = 20;
        explode(a.x, a.y, false);
        if (lives <= 0) { state = 'dead'; explode(player.x, player.y, true); setTimeout(()=>{ state='gameover'; shake = 0; recordRun(); }, 1200); }
        return false;
      }
    }
    return true;
  });

  // 粒子
  particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay; return p.life>0; });
  explosions = explosions.filter(e => { e.life-=e.decay; return e.life>0; });

  // 分數 (時間)
  if (frameCount % 6 === 0) score++;

  // 更新 UI
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = '❤️'.repeat(Math.max(lives, 0));
  document.getElementById('level').textContent = level;
}

// --- 繪製隕石（不規則多邊形）---
function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);
  ctx.beginPath();
  const pts = 9;
  for (let i = 0; i < pts; i++) {
    const angle = (i / pts) * Math.PI * 2;
    const rr = a.r * (0.75 + Math.sin(i * 2.3 + a.rot * 0.3) * 0.25);
    i === 0 ? ctx.moveTo(Math.cos(angle)*rr, Math.sin(angle)*rr)
             : ctx.lineTo(Math.cos(angle)*rr, Math.sin(angle)*rr);
  }
  ctx.closePath();
  ctx.fillStyle = a.color;
  ctx.fill();
  ctx.strokeStyle = '#fff4';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // 隕石光澤
  ctx.beginPath();
  ctx.arc(-a.r*0.25, -a.r*0.25, a.r*0.3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fill();
  ctx.restore();
}

// --- 繪製太空梭 ---
function drawShuttle(x, y, blink) {
  if (blink) return;
  ctx.save();
  ctx.translate(x, y);

  // 引擎光暈
  ctx.shadowColor = '#4af';
  ctx.shadowBlur = 18;

  // 主機身
  ctx.beginPath();
  ctx.moveTo(0, -28);
  ctx.bezierCurveTo(12, -10, 14, 10, 10, 28);
  ctx.lineTo(-10, 28);
  ctx.bezierCurveTo(-14, 10, -12, -10, 0, -28);
  ctx.fillStyle = '#cce8ff';
  ctx.fill();
  ctx.strokeStyle = '#89c4e1';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 駕駛艙窗
  ctx.beginPath();
  ctx.ellipse(0, -12, 7, 10, 0, 0, Math.PI*2);
  ctx.fillStyle = '#1af8';
  ctx.fill();
  ctx.strokeStyle = '#0af';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // 左翼
  ctx.beginPath();
  ctx.moveTo(-10, 10);
  ctx.lineTo(-28, 24);
  ctx.lineTo(-10, 24);
  ctx.closePath();
  ctx.fillStyle = '#8bb8d8';
  ctx.fill();

  // 右翼
  ctx.beginPath();
  ctx.moveTo(10, 10);
  ctx.lineTo(28, 24);
  ctx.lineTo(10, 24);
  ctx.closePath();
  ctx.fillStyle = '#8bb8d8';
  ctx.fill();

  // 引擎噴嘴
  ctx.beginPath();
  ctx.rect(-6, 26, 12, 6);
  ctx.fillStyle = '#556';
  ctx.fill();

  ctx.restore();
}

// --- Benchmark ---
function recordRun() {
  const entry = {
    run:      runHistory.length + 1,
    score,
    level,
    accuracy: shotsFired > 0 ? Math.round(shotsHit / shotsFired * 100) : 0,
    frames:   frameCount,
    mode:     gameMode,
    states:   { ...stateFrameCounts },
    strategy: currentStrategy,
    epochId:  currentEpochId,
  };
  runHistory.push(entry);
  if (currentEpochId !== null) epochRunsBuffer.push(entry);
  renderBenchmarkPanel();
  if (gameMode === 'ai' && epochSize > 1 && currentEpochId !== null) advanceEpoch();
}

function setStrategy(name) {
  currentStrategy = name;
  document.querySelectorAll('.strat-btn').forEach(b => b.classList.toggle('active', b.dataset.strat === name));
}

function setEpochSize(n) {
  epochSize = n;
  document.querySelectorAll('.epoch-btn').forEach(b => b.classList.toggle('active', +b.dataset.epoch === n));
}

function startEpoch() {
  epochIdCounter++;
  currentEpochId  = 'E' + epochIdCounter;
  epochCurrent    = 0;
  epochRunsBuffer = [];
  startGame('ai');
}

function advanceEpoch() {
  if (currentEpochId === null) return;
  epochCurrent++;
  document.getElementById('epoch-cur').textContent = epochCurrent;
  if (epochCurrent >= epochSize) {
    finalizeEpoch();
  } else {
    setTimeout(() => startGame('ai'), 400);
  }
}

function calcStdDev(arr) {
  if (arr.length < 2) return 0;
  const avg = arr.reduce((s, v) => s + v, 0) / arr.length;
  return Math.round(Math.sqrt(arr.reduce((s, v) => s + (v - avg) ** 2, 0) / arr.length));
}

function finalizeEpoch() {
  const scores = epochRunsBuffer.map(r => r.score);
  const frames = epochRunsBuffer.map(r => r.frames);
  const summary = {
    epochId:   currentEpochId,
    strategy:  AI_STRATEGIES[currentStrategy].name,
    epochSize: epochRunsBuffer.length,
    avgScore:  Math.round(scores.reduce((s, v) => s + v, 0) / scores.length),
    bestScore: Math.max(...scores),
    stdDev:    calcStdDev(scores),
    avgFrames: Math.round(frames.reduce((s, v) => s + v, 0) / frames.length),
  };
  epochHistory.push(summary);
  currentEpochId = null;
  epochCurrent   = 0;
  document.getElementById('epoch-hud').style.display = 'none';
  renderBenchmarkPanel();
  benchmarkVisible = true;
  document.getElementById('benchmark-panel').style.display = 'flex';
}

function renderBenchmarkPanel() {
  const tbody = document.getElementById('bm-tbody');
  if (!tbody) return;
  tbody.innerHTML = runHistory.slice().reverse().map(r => {
    const totalSF = Object.values(r.states).reduce((a, b) => a + b, 0) || 1;
    const pct = s => Math.round(s / totalSF * 100) + '%';
    const stratName = r.strategy ? (AI_STRATEGIES[r.strategy]?.name ?? r.strategy) : '—';
    return `<tr>
      <td>${r.run}</td>
      <td>${r.epochId ?? '—'}</td>
      <td>${stratName}</td>
      <td>${r.score}</td>
      <td>${r.level}</td>
      <td>${r.accuracy}%</td>
      <td>${(r.frames / 60).toFixed(1)}s</td>
      <td>${pct(r.states.Idle)}</td>
      <td>${pct(r.states.Tracking)}</td>
      <td>${pct(r.states.Firing)}</td>
      <td>${pct(r.states.Evading)}</td>
      <td>${pct(r.states.Dodging)}</td>
    </tr>`;
  }).join('');
  document.getElementById('bm-count').textContent = runHistory.length;
  if (runHistory.length > 0) {
    const scores = runHistory.map(r => r.score);
    const avg    = Math.round(scores.reduce((s, v) => s + v, 0) / scores.length);
    const best   = Math.max(...scores);
    document.getElementById('bm-avg').textContent     = avg;
    document.getElementById('bm-best').textContent    = best;
    document.getElementById('bm-std').textContent     = calcStdDev(scores);
    document.getElementById('bm-avgtime').textContent =
      (runHistory.reduce((s, r) => s + r.frames, 0) / runHistory.length / 60).toFixed(1);
  }
  // epoch 摘要
  const etbody = document.getElementById('epoch-summary-tbody');
  if (etbody) {
    etbody.innerHTML = epochHistory.slice().reverse().map(e =>
      `<tr>
        <td>${e.epochId}</td><td>${e.strategy}</td><td>${e.epochSize}</td>
        <td>${e.avgScore}</td><td>${e.bestScore}</td><td>${e.stdDev}</td>
        <td>${(e.avgFrames / 60).toFixed(1)}s</td>
      </tr>`
    ).join('');
  }
}

function exportCSV() {
  if (runHistory.length === 0) return;
  const headers = 'Run,EpochId,Strategy,Score,Level,Accuracy(%),Duration(s),Idle(%),Tracking(%),Firing(%),Evading(%),Dodging(%)';
  const rows = runHistory.map(r => {
    const totalSF = Object.values(r.states).reduce((a, b) => a + b, 0) || 1;
    const pct = s => Math.round(s / totalSF * 100);
    return [r.run, r.epochId ?? '', r.strategy ?? '', r.score, r.level, r.accuracy, (r.frames / 60).toFixed(1),
      pct(r.states.Idle), pct(r.states.Tracking), pct(r.states.Firing),
      pct(r.states.Evading), pct(r.states.Dodging)].join(',');
  });
  const csv  = [headers, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'benchmark.csv';
  a.click();
}

function drawBenchmarkChart() {
  if (runHistory.length === 0) return;
  const runs     = runHistory.slice(-10);
  const maxScore = Math.max(...runs.map(r => r.score), 1);
  const bx0  = 30, by0 = 415, bw = 420, bh = 185;
  const chartH = 90;
  const chartY = by0 + bh - 35;
  const barW   = Math.max(8, Math.floor((bw - 20) / runs.length) - 4);
  const totalW = runs.length * (barW + 4);
  const chartX = bx0 + Math.round((bw - totalW) / 2);

  ctx.fillStyle = 'rgba(0,0,20,0.88)';
  ctx.fillRect(bx0, by0, bw, bh);
  ctx.strokeStyle = '#0ff3';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx0, by0, bw, bh);

  ctx.font = '11px Courier New';
  ctx.fillStyle = '#0ff';
  ctx.textAlign = 'center';
  ctx.fillText(`最近 ${runs.length} 場分數趨勢  [B 查看詳細 / E 匯出]`, bx0 + bw / 2, by0 + 16);

  // baseline
  ctx.strokeStyle = '#0ff4';
  ctx.beginPath();
  ctx.moveTo(chartX - 4, chartY);
  ctx.lineTo(chartX + totalW + 4, chartY);
  ctx.stroke();

  runs.forEach((r, i) => {
    const bHeight = Math.max(2, Math.round((r.score / maxScore) * chartH));
    const barX    = chartX + i * (barW + 4);
    const barY    = chartY - bHeight;
    const isLast  = i === runs.length - 1;
    ctx.fillStyle = isLast ? '#0ff' : '#0a8';
    ctx.fillRect(barX, barY, barW, bHeight);
    ctx.font      = '8px Courier New';
    ctx.textAlign = 'center';
    ctx.fillStyle = isLast ? '#0ff' : '#aef';
    ctx.fillText(r.score, barX + barW / 2, barY - 2);
    ctx.fillStyle = '#557';
    ctx.fillText(`#${r.run}`, barX + barW / 2, chartY + 14);
  });

  ctx.font      = '9px Courier New';
  ctx.fillStyle = '#0ff8';
  ctx.textAlign = 'right';
  ctx.fillText(maxScore, chartX - 8, by0 + 30 + 4);
  ctx.fillText('0', chartX - 8, chartY + 4);
}

// --- Debug HUD ---
function drawHUD() {
  if (!hudVisible) return;
  const x = 8, y = 8, pw = 210;
  const acc = shotsFired > 0 ? Math.round(shotsHit / shotsFired * 100) : 0;
  const lines = [
    ['[ DEBUG HUD ]  (H to toggle)', '#0ff'],
    [`mode  : ${gameMode}`,                              '#aef'],
    [`state : ${state}`,                                 '#aef'],
    [`frame : ${frameCount}`,                            '#aef'],
    [`shots : ${shotsHit}/${shotsFired} (${acc}%)`,      '#aef'],
  ];
  if (gameMode === 'ai') {
    const hudColor = { Dodging:'#f44', Evading:'#f80', Firing:'#0f8', Tracking:'#ff8', Idle:'#88f' };
    lines.push(['', '']);
    lines.push([`AI ► ${aiDecisionState}`, hudColor[aiDecisionState] ?? '#fff']);
    lines.push([`strategy  : ${AI_STRATEGIES[currentStrategy].name}`, '#aef']);
    lines.push([`safetyViz : ${safetyRadiusVisible ? 'ON (R)' : 'OFF (R)'}`, safetyRadiusVisible ? '#f88' : '#556']);
    lines.push([`safetyR   : ${aiParams.safetyRadius}`,    '#ccc']);
    lines.push([`aggression: ${aiParams.aggressionLevel}`, '#ccc']);
    lines.push([`aimTol    : ${aiParams.aimTolerance}`,    '#ccc']);
    lines.push([`lookahead : ${aiParams.lookaheadFrames}fr`,'#ccc']);
  }
  const ph = 18 + lines.length * 15;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(x, y, pw, ph);
  ctx.strokeStyle = '#0ff4';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, pw, ph);
  ctx.font = '11px Courier New';
  ctx.textAlign = 'left';
  lines.forEach(([text, color], i) => {
    ctx.fillStyle = color;
    ctx.fillText(text, x + 8, y + 14 + i * 15);
  });
  ctx.restore();
}

// --- 模式選單 ---
function drawModeMenu() {

  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 26px Courier New';

  ctx.shadowColor = '#0ff';

// --- 繪製 ---
function draw() {
  // 震動效果
  let sx = 0, sy = 0;
  if (shake > 0) { sx = (Math.random()-0.5)*8; sy = (Math.random()-0.5)*8; }

  ctx.save();
  ctx.translate(sx, sy);

  // 背景
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);

  // 星空
  stars.forEach(s => {
    const a = 0.3 + Math.sin(frameCount * 0.02 + s.bright * 10) * 0.3;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,220,255,${a})`;
    ctx.fill();
  });

  // 尾焰
  player.trail.forEach(t => {
    const g = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, t.r);
    g.addColorStop(0, `rgba(100,180,255,${t.life})`);
    g.addColorStop(0.5, `rgba(50,80,255,${t.life*0.5})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.r, 0, Math.PI*2);
    ctx.fill();
  });

  // 爆炸
  explosions.forEach(e => {
    const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r);
    g.addColorStop(0, `rgba(255,220,100,${e.life})`);
    g.addColorStop(0.5, `rgba(255,80,0,${e.life*0.6})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
    ctx.fill();
  });

  // 粒子
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // 隕石
  asteroids.forEach(drawAsteroid);

  // 雷射
  lasers.forEach(l => {
    ctx.save();
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 10;
    const g = ctx.createLinearGradient(l.x, l.y, l.x, l.y + l.h);
    g.addColorStop(0, '#fff');
    g.addColorStop(1, '#0ff');
    ctx.fillStyle = g;
    ctx.fillRect(l.x - l.w/2, l.y, l.w, l.h);
    ctx.restore();
  });

  // 玩家（閃爍效果）
  const blink = invincible > 0 && Math.floor(frameCount / 4) % 2 === 0;
  if (state !== 'dead') drawShuttle(player.x, player.y, blink);

  // 安全距離視覺化
  if (safetyRadiusVisible && gameMode === 'ai' && state !== 'dead') {
    const stratMultipliers = { threat: 1.0, aggressive: 0.6, defensive: 1.5 };
    const mult = stratMultipliers[currentStrategy] ?? 1.0;
    const effectiveR = aiParams.safetyRadius * mult;
    ctx.save();
    ctx.setLineDash([5, 4]);
    // 基礎安全距離（params 設定值）
    ctx.strokeStyle = 'rgba(255, 80, 80, 0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(player.x, player.y, aiParams.safetyRadius, 0, Math.PI * 2);
    ctx.stroke();
    // 當前策略有效安全距離
    if (Math.abs(mult - 1.0) > 0.01) {
      ctx.strokeStyle = 'rgba(255, 60, 60, 0.9)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 3]);
      ctx.beginPath();
      ctx.arc(player.x, player.y, effectiveR, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  // 開始畫面
  if (state === 'start') {
    ctx.fillStyle = 'rgba(0,0,16,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#0ff';
    ctx.font = 'bold 36px Courier New';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 20;
    ctx.fillText('太空梭躲避隕石', W/2, H/2 - 60);
    ctx.shadowBlur = 0;
    ctx.font = '18px Courier New';
    ctx.fillStyle = '#aef';
    ctx.fillText('方向鍵 / WASD 移動', W/2, H/2);
    ctx.fillText('Space 發射雷射', W/2, H/2 + 30);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px Courier New';
    const pulse = 0.5 + Math.sin(frameCount * 0.06) * 0.5;
    ctx.globalAlpha = pulse;
    ctx.fillText('按 Space / Enter 開始', W/2, H/2 + 80);
    ctx.globalAlpha = 1;
  }

  // 遊戲結束
  if (state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = 'bold 40px Courier New';
    ctx.fillStyle = '#f44';
    ctx.shadowColor = '#f44';
    ctx.shadowBlur = 20;
    ctx.fillText('任務失敗', W/2, H/2 - 60);
    ctx.shadowBlur = 0;
    ctx.font = '22px Courier New';
    ctx.fillStyle = '#ffd';
    ctx.fillText(`最終分數：${score}`, W/2, H/2 - 10);
    ctx.fillText(`達到等級：${level}`, W/2, H/2 + 25);
    ctx.font = 'bold 18px Courier New';
    ctx.fillStyle = '#aef';
    const pulse = 0.5 + Math.sin(frameCount * 0.06) * 0.5;
    ctx.globalAlpha = pulse;
    ctx.fillText('按 Space / Enter 返回選單', W/2, H/2 + 75);
    ctx.globalAlpha = 1;
    drawBenchmarkChart();
  }

  // 模式選單
  if (state === 'menu') drawModeMenu();

  // Debug HUD（最上層）
  drawHUD();

  ctx.restore();
}

// --- 主迴圈 ---
function loop() {
  if (state === 'playing' || state === 'dead') update();
  else if (state === 'start' || state === 'gameover' || state === 'menu' || state === 'ai_params') {
    frameCount++;
    stars.forEach(s => { s.y += s.speed; if (s.y > H) s.y = 0; });
    particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay; return p.life>0; });
    explosions = explosions.filter(e => { e.life-=e.decay; return e.life>0; });
  }
  draw();
  requestAnimationFrame(loop);
}

loop();

// --- AI 面板事件 ---
document.getElementById('p-reaction').addEventListener('input', e => {
  aiParams.reactionDelay = +e.target.value;
  document.getElementById('v-reaction').textContent = e.target.value + ' ms';
});
document.getElementById('p-safety').addEventListener('input', e => {
  aiParams.safetyRadius = +e.target.value;
  document.getElementById('v-safety').textContent = e.target.value + ' px';
});
document.getElementById('p-aim').addEventListener('input', e => {
  aiParams.aimTolerance = +e.target.value;
  document.getElementById('v-aim').textContent = e.target.value + ' px';
});
document.getElementById('p-aggr').addEventListener('input', e => {
  aiParams.aggressionLevel = +e.target.value;
  document.getElementById('v-aggr').textContent = e.target.value;
});
document.getElementById('p-look').addEventListener('input', e => {
  aiParams.lookaheadFrames = +e.target.value;
  document.getElementById('v-look').textContent = e.target.value + ' fr';
});
document.getElementById('btn-back').addEventListener('click', () => {
  hideAiPanel(); state = 'menu';
});
document.getElementById('btn-start').addEventListener('click', () => {
  hideAiPanel();
  if (epochSize > 1) {
    startEpoch();
  } else {
    currentEpochId = null;
    startGame('ai');
  }
});
document.querySelectorAll('.strat-btn').forEach(b => {
  b.addEventListener('click', () => setStrategy(b.dataset.strat));
});
document.querySelectorAll('.epoch-btn').forEach(b => {
  b.addEventListener('click', () => setEpochSize(+b.dataset.epoch));
});
document.getElementById('btn-bm-close').addEventListener('click', () => {
  benchmarkVisible = false;
  document.getElementById('benchmark-panel').style.display = 'none';
});
document.getElementById('btn-bm-export').addEventListener('click', exportCSV);
</script>
